<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>Library</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style.css" rel="stylesheet"/>
    <script src="script.js" async></script>
</head>
<body>
    <header class="headerContainer">
        <div class="webpageTitle">Your Personal Library</div>
        <div class="controlBord">
            <button type="button" class="dialogShow">New Book</button>
            <dialog class="dialogWindow">
                <form action="" method=""> 
                    <div>
                        <label for="bookName">Book name:</label>
                        <input id="bookName" type="text" name="bookName" required/>
                    </div>
                    <div>
                        <label for="author">Author name:</label>
                        <input id="author" type="text" name="author" required/>
                    </div>
                    <div>
                        <label for="pageNr">Page number:</label>
                        <input id="pageNr" type="number" name="pageNr" required/>
                    </div>
                    <div>
                        <label for="statusBook">Status:</label>
                        <select id="statusBook" name="statusBook" required>
                            <option value="" selected>--Please select a option--</option>
                            <option value="I read it">I read it</option>
                            <option value="I did not read it">I did not read it</option>
                            <option value="I am reading it right now">I am reading it right now</option>
                        </select>
                    </div>
                    <button type="submit" class="submitForm">Submit</button>
                </form>
                <button type="button" class="dialogClose">Cancel</button>
                <div class="infoMessage"></div> 
            </dialog> 
        </div>
    </header>
    <section class="libraryContainer">
        <div class="titleLibrary">
            My Library,
        </div>
        <div class="bookCardContainer"> 
            
        </div>
    </section>
    <footer>
    </footer>
</body>
</html>
