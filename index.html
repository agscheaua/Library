<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>Library</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style.css" rel="stylesheet"/>
    <script src="script.js" async></script>
</head>
<body>
    <header class="headerContainer">
        <div class="webpageTitle">Your Personal Library</div>
        <div class="controlBord">
            <button type="button" class="dialogShow">New Book</button>
            <dialog class="dialogWindow">
                <form action="" method="dialog">
                    <div>
                        <label for="bookName">Book name:</label>
                        <input id="bookName" type="text" name="bookName"/>
                    </div>
                    <div>
                        <label for="author">Author name:</label>
                        <input id="author" type="text" name="author"/>
                    </div>
                    <div>
                        <label for="pageNr">Page number:</label>
                        <input id="pageNr" type="number" name="pageNr"/>
                    </div>
                    <div>
                        <label for="statusBook">Status:</label>
                        <select id="statusBook" name="statusBook">
                            <option value="">--Please select a option--</option>
                            <option value="read it">read it</option>
                            <option value="not read it">not read it</option>
                        </select>
                    </div>
                    <button class="submitForm" formmethod="dialog">Submit</button>
                </form>
                <button type="button" class="dialogClose">Close</button>
            </dialog> 
        </div>
    </header>
    <section class="libraryContainer">
        <div class="titleLibrary">
            My Library,
        </div>
        <div class="bookCardContainer"> 
            
        </div>
    </section>
    <footer>
    </footer>
</body>
</html>
